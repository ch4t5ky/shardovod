services:
  minecraft:
    image: itzg/minecraft-server:stable-java16
    container_name: minecraft
    restart: unless-stopped
    ports:
      - "25565:25565"   # game port
      - "25575:25575"   # RCON (only expose to localhost in production)
    environment:
      # Accept EULA automatically
      EULA: "TRUE"
      ENABLE_WHITELIST: "false"
      ENFORE_WHITELIST: "false"
      ONLINE_MODE: "false"
      # Pin to exactly 1.16.5
      VERSION: "1.16.5"
      TYPE: "PAPER"

      # Server settings
      DIFFICULTY: "peaceful"       # no hostile mobs — cleaner workshop env
      MODE: "adventure"         # players can fly and see everything
      SPAWN_MONSTERS: false
      ALLOW_FLIGHT: "true"
      MAX_PLAYERS: "40"
      LEVEL_TYPE: FLAT
      GENERATOR_SETTINGS: >-
          {
              "layers": [
                  {
                      "block": "minecraft:bedrock",
                      "height": 1
                  },
                  {
                      "block": "minecraft:stone",
                      "height": 2
                  },
                  {
                      "block": "minecraft:sandstone",
                      "height": 15
                  }
              ],
              "biome": "minecraft:desert"
          }
      MOTD: "OpenSearch Cluster Simulator"
      SPAWN_PROTECTION: "0"        # allow building at spawn

      # RCON — must match shardovod -rcon-pass flag
      ENABLE_RCON: "true"
      RCON_PORT: "25575"
      RCON_PASSWORD: "shardovod_rcon"
      BROADCAST_RCON_TO_OPS: "false"

      # Give shardovod permission to run commands without op
      # (alternatively add it to ops.json)
      ENABLE_COMMAND_BLOCK: "true"

      # Performance
      MEMORY: "4G"
      USE_AIKAR_FLAGS: "true"
      ICON: /data/icon.jpg
      OVERRIDE_ICON: true
      OPS: |
        84177fe7-3cb4-3709-a185-8f6ff9ad0a0c
        eb623282-d6b0-3cd7-91d3-6c198b428770
    volumes:
      - ./data:/data
      - ./plugins:/data/plugins
      - ./mods:/data/mods
      - ./resources/icon.jpg:/data/icon.jpg